<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>🔍 Metadata Viewer Pro - Music Analyzer</title>
        <script src="https://cdn.jsdelivr.net/npm/howler@2.2.3/dist/howler.min.js"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
                    sans-serif;
                background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
                min-height: 100vh;
                color: white;
                overflow-x: hidden;
            }

            .main-container {
                max-width: 1600px;
                margin: 0 auto;
                padding: 20px;
            }

            /* Header */
            .header {
                text-align: center;
                margin-bottom: 30px;
                animation: fadeInDown 0.5s ease;
            }

            .header h1 {
                font-size: 3rem;
                background: linear-gradient(45deg, #667eea, #764ba2, #f093fb);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                margin-bottom: 10px;
                text-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
            }

            .header p {
                color: #a0a0a0;
                font-size: 1.1rem;
            }

            /* Search Section */
            .search-section {
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 20px;
                padding: 25px;
                margin-bottom: 30px;
                animation: fadeIn 0.6s ease;
            }

            .search-controls {
                display: flex;
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .search-input {
                flex: 1;
                min-width: 300px;
                padding: 15px 25px;
                border: 2px solid rgba(255, 255, 255, 0.1);
                border-radius: 50px;
                background: rgba(255, 255, 255, 0.05);
                color: white;
                font-size: 16px;
                transition: all 0.3s ease;
            }

            .search-input:focus {
                outline: none;
                border-color: #667eea;
                background: rgba(255, 255, 255, 0.1);
                box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            }

            .search-input::placeholder {
                color: rgba(255, 255, 255, 0.4);
            }

            .btn {
                padding: 15px 30px;
                border: none;
                border-radius: 50px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
                box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            }

            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5);
            }

            .btn:active {
                transform: translateY(0);
            }

            .btn.secondary {
                background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            }

            .btn.tertiary {
                background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            }

            /* Stats Bar */
            .stats-bar {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
                margin-bottom: 30px;
                animation: fadeIn 0.7s ease;
            }

            .stat-card {
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 15px;
                padding: 20px;
                text-align: center;
                transition: all 0.3s ease;
            }

            .stat-card:hover {
                transform: translateY(-5px);
                background: rgba(255, 255, 255, 0.08);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            }

            .stat-value {
                font-size: 2.5rem;
                font-weight: bold;
                background: linear-gradient(45deg, #ffd700, #ffed4b);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .stat-label {
                color: #a0a0a0;
                font-size: 0.9rem;
                margin-top: 5px;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            /* Player Section */
            .player-section {
                background: rgba(0, 0, 0, 0.3);
                backdrop-filter: blur(30px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 20px;
                padding: 30px;
                margin-bottom: 30px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
                animation: slideIn 0.5s ease;
            }

            .player-main {
                display: flex;
                align-items: center;
                gap: 30px;
                margin-bottom: 20px;
            }

            .play-btn-main {
                width: 80px;
                height: 80px;
                border-radius: 50%;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border: none;
                color: white;
                font-size: 30px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.3s ease;
                box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            }

            .play-btn-main:hover {
                transform: scale(1.1);
                box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
            }

            .play-btn-main.playing {
                background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
                animation: pulse 2s infinite;
            }

            .player-info {
                flex: 1;
            }

            .player-title {
                font-size: 1.5rem;
                font-weight: bold;
                margin-bottom: 5px;
            }

            .player-artist {
                color: #a0a0a0;
                font-size: 1.1rem;
            }

            .volume-section {
                display: flex;
                align-items: center;
                gap: 15px;
            }

            .volume-slider {
                width: 120px;
                height: 6px;
                -webkit-appearance: none;
                appearance: none;
                background: rgba(255, 255, 255, 0.2);
                border-radius: 3px;
                outline: none;
            }

            .volume-slider::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                width: 18px;
                height: 18px;
                background: #667eea;
                border-radius: 50%;
                cursor: pointer;
                box-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
            }

            .progress-section {
                margin: 20px 0;
            }

            .progress-bar {
                position: relative;
                height: 50px;
                background: rgba(0, 0, 0, 0.4);
                border-radius: 10px;
                overflow: hidden;
                cursor: pointer;
                margin-bottom: 10px;
            }

            .waveform-canvas {
                position: absolute;
                width: 100%;
                height: 100%;
                opacity: 0.3;
            }

            .progress-fill {
                position: absolute;
                height: 100%;
                background: linear-gradient(90deg, #667eea, #764ba2);
                width: 0%;
                transition: width 0.1s linear;
            }

            .time-display {
                display: flex;
                justify-content: space-between;
                color: #a0a0a0;
                font-size: 0.9rem;
            }

            .player-controls {
                display: flex;
                justify-content: center;
                gap: 15px;
                flex-wrap: wrap;
            }

            .control-btn {
                padding: 10px 20px;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: white;
                border-radius: 10px;
                cursor: pointer;
                transition: all 0.3s ease;
                font-size: 14px;
            }

            .control-btn:hover {
                background: rgba(255, 255, 255, 0.2);
                transform: translateY(-2px);
            }

            .control-btn.active {
                background: #667eea;
                border-color: #667eea;
            }

            /* Results Grid */
            .results-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
                gap: 25px;
                animation: fadeInUp 0.6s ease;
            }

            .result-card {
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 20px;
                padding: 25px;
                transition: all 0.3s ease;
            }

            .result-card:hover {
                transform: translateY(-5px);
                background: rgba(255, 255, 255, 0.08);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            }

            .card-header {
                display: flex;
                align-items: center;
                gap: 15px;
                margin-bottom: 20px;
                padding-bottom: 15px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }

            .card-icon {
                font-size: 2rem;
            }

            .card-title {
                font-size: 1.3rem;
                font-weight: 600;
            }

            .artwork-container {
                text-align: center;
                margin: 20px 0;
            }

            .artwork-img {
                max-width: 100%;
                width: 250px;
                height: 250px;
                object-fit: cover;
                border-radius: 15px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            }

            .play-overlay {
                margin-top: 20px;
            }

            .play-artwork-btn {
                width: 80px;
                height: 80px;
                border-radius: 50%;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border: none;
                color: white;
                font-size: 30px;
                cursor: pointer;
                transition: all 0.3s ease;
                box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            }

            .play-artwork-btn:hover {
                transform: scale(1.1);
                box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
            }

            .metadata-list {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .metadata-item {
                display: flex;
                justify-content: space-between;
                padding: 10px;
                background: rgba(0, 0, 0, 0.2);
                border-radius: 8px;
                transition: background 0.2s ease;
            }

            .metadata-item:hover {
                background: rgba(0, 0, 0, 0.3);
            }

            .metadata-label {
                color: #667eea;
                font-weight: 600;
                font-size: 0.9rem;
            }

            .metadata-value {
                color: #e0e0e0;
                text-align: right;
                word-break: break-word;
                max-width: 60%;
            }

            .metadata-value.empty {
                color: #606060;
                font-style: italic;
            }

            /* AI Analysis Bars */
            .ai-bars {
                margin-top: 20px;
            }

            .ai-bar-item {
                margin-bottom: 15px;
            }

            .ai-bar-label {
                display: flex;
                justify-content: space-between;
                margin-bottom: 5px;
                font-size: 0.9rem;
                color: #a0a0a0;
            }

            .ai-bar-container {
                height: 25px;
                background: rgba(0, 0, 0, 0.3);
                border-radius: 12px;
                overflow: hidden;
            }

            .ai-bar-fill {
                height: 100%;
                border-radius: 12px;
                transition: width 0.5s ease;
                display: flex;
                align-items: center;
                justify-content: flex-end;
                padding-right: 10px;
                font-size: 12px;
                font-weight: bold;
                color: white;
            }

            /* Animations */
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            @keyframes fadeInDown {
                from {
                    opacity: 0;
                    transform: translateY(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateX(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }

            @keyframes pulse {
                0% {
                    box-shadow: 0 0 0 0 rgba(240, 147, 251, 0.7);
                }
                70% {
                    box-shadow: 0 0 0 15px rgba(240, 147, 251, 0);
                }
                100% {
                    box-shadow: 0 0 0 0 rgba(240, 147, 251, 0);
                }
            }

            /* Loading & Error States */
            .loading-container,
            .error-container {
                text-align: center;
                padding: 60px;
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(20px);
                border-radius: 20px;
                margin: 30px 0;
            }

            .loading-spinner {
                width: 60px;
                height: 60px;
                border: 4px solid rgba(255, 255, 255, 0.1);
                border-top: 4px solid #667eea;
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin: 0 auto 20px;
            }

            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }

            .error-container {
                background: rgba(239, 68, 68, 0.1);
                border: 1px solid rgba(239, 68, 68, 0.3);
            }

            .error-icon {
                font-size: 3rem;
                margin-bottom: 15px;
            }

            /* Responsive */
            @media (max-width: 768px) {
                .header h1 {
                    font-size: 2rem;
                }

                .search-controls {
                    flex-direction: column;
                }

                .search-input {
                    min-width: 100%;
                }

                .player-main {
                    flex-direction: column;
                    text-align: center;
                }

                .results-grid {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <div class="main-container">
            <!-- Header -->
            <div class="header">
                <h1>🔍 Metadata Viewer Pro</h1>
                <p>Analyze and play your music library with detailed metadata inspection</p>
            </div>

            <!-- Search Section -->
            <div class="search-section">
                <div class="search-controls">
                    <input
                        type="text"
                        id="searchInput"
                        class="search-input"
                        placeholder="Search by title, artist, album or filename..."
                    />
                    <button class="btn" onclick="searchFiles()">🔍 Search</button>
                    <button class="btn secondary" onclick="loadRandom()">🎲 Random</button>
                    <button class="btn tertiary" onclick="refreshData()">🔄 Refresh</button>
                </div>
            </div>

            <!-- Stats Bar -->
            <div id="statsBar" class="stats-bar" style="display: none">
                <div class="stat-card">
                    <div class="stat-value" id="totalFiles">0</div>
                    <div class="stat-label">Total Files</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="withArtwork">0</div>
                    <div class="stat-label">With Artwork</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="withAI">0</div>
                    <div class="stat-label">AI Analysis</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgBPM">0</div>
                    <div class="stat-label">Avg BPM</div>
                </div>
            </div>

            <!-- Player Section -->
            <div id="playerSection" class="player-section" style="display: none">
                <div class="player-main">
                    <button id="playBtn" class="play-btn-main" onclick="togglePlay()">
                        <span id="playIcon">▶</span>
                    </button>
                    <div class="player-info">
                        <div id="playerTitle" class="player-title">No track loaded</div>
                        <div id="playerArtist" class="player-artist">Select a track to play</div>
                    </div>
                    <div class="volume-section">
                        <span>🔊</span>
                        <input
                            type="range"
                            id="volumeSlider"
                            class="volume-slider"
                            min="0"
                            max="100"
                            value="70"
                        />
                        <span id="volumeValue">70%</span>
                    </div>
                </div>

                <div class="progress-section">
                    <div id="playerProgress" class="progress-bar">
                        <canvas id="waveform" class="waveform-canvas"></canvas>
                        <div id="progressBar" class="progress-fill"></div>
                    </div>
                    <div class="time-display">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <div class="player-controls">
                    <button class="control-btn" onclick="skipBackward()">⏮ -10s</button>
                    <button class="control-btn" onclick="skipForward()">⏭ +10s</button>
                    <button id="loopBtn" class="control-btn" onclick="toggleLoop()">🔁 Loop</button>
                    <button id="speedBtn" class="control-btn" onclick="changeSpeed()">
                        ⚡ 1.0x
                    </button>
                </div>
            </div>

            <!-- Results Section -->
            <div id="results" class="results-grid"></div>
        </div>

        <script>
            const { ipcRenderer } = require('electron');
            const path = require('path');

            // Global variables
            let currentFile = null;
            let currentSound = null;
            let isLooping = false;
            let currentSpeed = 1.0;
            let animationId = null;
            let currentData = null;

            // Initialize on load
            window.addEventListener('DOMContentLoaded', () => {
                loadStats();
                loadRandom();

                // Enter key to search
                document.getElementById('searchInput').addEventListener('keypress', e => {
                    if (e.key === 'Enter') searchFiles();
                });
            });

            // Load statistics
            async function loadStats() {
                try {
                    const stats = await ipcRenderer.invoke('get-database-stats');
                    if (stats) {
                        document.getElementById('totalFiles').textContent = stats.totalFiles || '0';
                        document.getElementById('withArtwork').textContent =
                            stats.withArtwork || '0';
                        document.getElementById('withAI').textContent = stats.withAI || '0';
                        document.getElementById('avgBPM').textContent = Math.round(
                            stats.avgBPM || 0
                        );
                        document.getElementById('statsBar').style.display = 'grid';
                    }
                } catch (error) {
                    console.error('Error loading stats:', error);
                }
            }

            // Search files
            async function searchFiles() {
                const searchTerm = document.getElementById('searchInput').value.trim();
                if (!searchTerm) {
                    showError('Please enter a search term');
                    return;
                }

                showLoading();

                try {
                    const results = await ipcRenderer.invoke('search-metadata', searchTerm);
                    if (results && results.length > 0) {
                        await loadFileMetadata(results[0].file_path);
                    } else {
                        showError('No results found for "' + searchTerm + '"');
                    }
                } catch (error) {
                    showError('Search error: ' + error.message);
                }
            }

            // Load random file
            async function loadRandom() {
                showLoading();

                try {
                    const result = await ipcRenderer.invoke('get-random-file');
                    if (result && result.file_path) {
                        await loadFileMetadata(result.file_path);
                    } else {
                        showError('No files found in database');
                    }
                } catch (error) {
                    showError('Error loading random file: ' + error.message);
                }
            }

            // Load file metadata
            async function loadFileMetadata(filePath) {
                if (!filePath) return;

                currentFile = filePath;
                showLoading();

                try {
                    const data = await ipcRenderer.invoke('get-file-metadata', filePath);
                    if (data) {
                        currentData = data;
                        displayResults(data);
                    } else {
                        showError('Could not load metadata');
                    }
                } catch (error) {
                    showError('Error loading metadata: ' + error.message);
                }
            }

            // Display results
            function displayResults(data) {
                const resultsDiv = document.getElementById('results');
                let html = '';

                // Artwork card
                if (data.artwork || data.filePath) {
                    html += `
                    <div class="result-card">
                        <div class="card-header">
                            <span class="card-icon">🎨</span>
                            <h2 class="card-title">Artwork & Playback</h2>
                        </div>
                        <div class="artwork-container">
                            ${
                                data.artwork
                                    ? `<img src="${data.artwork}" class="artwork-img" alt="Album Artwork">`
                                    : `<div style="width: 250px; height: 250px; margin: 0 auto; background: rgba(0,0,0,0.3); border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #606060;">
                                    <div style="text-align: center;">
                                        <div style="font-size: 4rem; margin-bottom: 10px;">🎵</div>
                                        <div>No Artwork</div>
                                    </div>
                                </div>`
                            }
                            <div class="play-overlay">
                                <button class="play-artwork-btn" onclick="initPlayerFromData()">▶</button>
                                <p style="margin-top: 10px; color: #a0a0a0;">Click to play</p>
                            </div>
                        </div>
                    </div>
                `;
                }

                // File information card
                html += `
                <div class="result-card">
                    <div class="card-header">
                        <span class="card-icon">📁</span>
                        <h2 class="card-title">File Information</h2>
                    </div>
                    <div class="metadata-list">
                        ${createMetadataItem('Filename', path.basename(data.filePath))}
                        ${createMetadataItem('Path', data.filePath)}
                        ${createMetadataItem('Size', formatFileSize(data.fileSize))}
                        ${createMetadataItem('Format', data.format?.container)}
                        ${createMetadataItem('Codec', data.format?.codec)}
                        ${createMetadataItem('Sample Rate', data.format?.sampleRate ? data.format.sampleRate + ' Hz' : null)}
                        ${createMetadataItem('Bitrate', formatBitrate(data.format?.bitrate))}
                        ${createMetadataItem('Duration', formatDuration(data.format?.duration))}
                        ${createMetadataItem('Channels', data.format?.channels)}
                        ${createMetadataItem('Lossless', data.format?.lossless ? '✅ Yes' : '❌ No')}
                    </div>
                </div>
            `;

                // Metadata card
                html += `
                <div class="result-card">
                    <div class="card-header">
                        <span class="card-icon">🏷️</span>
                        <h2 class="card-title">File Metadata</h2>
                    </div>
                    <div class="metadata-list">
                        ${createMetadataItem('Title', data.metadata?.title)}
                        ${createMetadataItem('Artist', data.metadata?.artist)}
                        ${createMetadataItem('Album', data.metadata?.album)}
                        ${createMetadataItem('Year', data.metadata?.year)}
                        ${createMetadataItem('Genre', data.metadata?.genre)}
                        ${createMetadataItem('Track', data.metadata?.track)}
                        ${createMetadataItem('BPM', data.metadata?.bpm)}
                        ${createMetadataItem('Key', data.metadata?.key)}
                        ${createMetadataItem('ISRC', data.metadata?.isrc)}
                        ${createMetadataItem('Label', data.metadata?.label)}
                        ${createMetadataItem('Composer', data.metadata?.composer)}
                    </div>
                </div>
            `;

                // Database card
                if (data.database) {
                    html += `
                    <div class="result-card">
                        <div class="card-header">
                            <span class="card-icon">💾</span>
                            <h2 class="card-title">Database Records</h2>
                        </div>
                        <div class="metadata-list">
                            ${createMetadataItem('DB ID', data.database.id)}
                            ${createMetadataItem('Title (DB)', data.database.title)}
                            ${createMetadataItem('Artist (DB)', data.database.artist)}
                            ${createMetadataItem('Album (DB)', data.database.album)}
                            ${createMetadataItem('Genre (DB)', data.database.genre)}
                            ${createMetadataItem('Created', formatDate(data.database.created_at))}
                            ${createMetadataItem('Updated', formatDate(data.database.updated_at))}
                        </div>
                    </div>
                `;
                }

                // AI Analysis card
                if (data.ai && hasAIData(data.ai)) {
                    html += `
                    <div class="result-card">
                        <div class="card-header">
                            <span class="card-icon">🤖</span>
                            <h2 class="card-title">AI Analysis</h2>
                        </div>
                        <div class="metadata-list">
                            ${createMetadataItem('AI Genre', data.ai.LLM_GENRE)}
                            ${createMetadataItem('AI Mood', data.ai.AI_MOOD)}
                            ${createMetadataItem('LLM Mood', data.ai.LLM_MOOD)}
                            ${createMetadataItem('AI BPM', data.ai.AI_BPM)}
                            ${createMetadataItem('AI Key', data.ai.AI_KEY)}
                            ${createMetadataItem('Loudness', data.ai.AI_LOUDNESS ? data.ai.AI_LOUDNESS + ' dB' : null)}
                        </div>
                        ${createAIBars(data.ai)}
                    </div>
                `;
                }

                resultsDiv.innerHTML = html;
            }

            // Create metadata item
            function createMetadataItem(label, value) {
                const hasValue = value !== null && value !== undefined && value !== '';
                return `
                <div class="metadata-item">
                    <span class="metadata-label">${label}</span>
                    <span class="metadata-value ${hasValue ? '' : 'empty'}">${hasValue ? value : 'N/A'}</span>
                </div>
            `;
            }

            // Create AI analysis bars
            function createAIBars(ai) {
                const bars = [
                    { label: 'Energy', value: ai.AI_ENERGY, color: '#ef4444' },
                    { label: 'Danceability', value: ai.AI_DANCEABILITY, color: '#f59e0b' },
                    { label: 'Valence', value: ai.AI_VALENCE, color: '#10b981' },
                    { label: 'Acousticness', value: ai.AI_ACOUSTICNESS, color: '#3b82f6' },
                    { label: 'Instrumentalness', value: ai.AI_INSTRUMENTALNESS, color: '#8b5cf6' },
                    { label: 'Liveness', value: ai.AI_LIVENESS, color: '#ec4899' },
                    { label: 'Speechiness', value: ai.AI_SPEECHINESS, color: '#14b8a6' }
                ];

                let html = '<div class="ai-bars">';

                bars.forEach(bar => {
                    if (bar.value !== null && bar.value !== undefined) {
                        const percentage = Math.round(bar.value * 100);
                        html += `
                        <div class="ai-bar-item">
                            <div class="ai-bar-label">
                                <span>${bar.label}</span>
                                <span>${percentage}%</span>
                            </div>
                            <div class="ai-bar-container">
                                <div class="ai-bar-fill" style="width: ${percentage}%; background: ${bar.color};">
                                </div>
                            </div>
                        </div>
                    `;
                    }
                });

                html += '</div>';
                return html;
            }

            // Check if AI data exists
            function hasAIData(ai) {
                return ai && Object.values(ai).some(value => value !== null && value !== undefined);
            }

            // Player Functions
            function initPlayerFromData() {
                if (currentData && currentData.filePath) {
                    const title =
                        currentData.metadata?.title ||
                        currentData.database?.title ||
                        path.basename(currentData.filePath);
                    const artist =
                        currentData.metadata?.artist ||
                        currentData.database?.artist ||
                        'Unknown Artist';
                    initPlayer(currentData.filePath, title, artist);
                }
            }

            function initPlayer(filePath, title, artist) {
                if (currentSound) {
                    currentSound.unload();
                }

                document.getElementById('playerSection').style.display = 'block';
                document.getElementById('playerTitle').textContent = title;
                document.getElementById('playerArtist').textContent = artist;

                currentSound = new Howl({
                    src: [filePath],
                    html5: true,
                    volume: 0.7,
                    rate: currentSpeed,
                    loop: isLooping,
                    onload: function () {
                        const duration = currentSound.duration();
                        document.getElementById('duration').textContent = formatTime(duration);
                        drawWaveform();
                    },
                    onplay: function () {
                        document.getElementById('playIcon').textContent = '⏸';
                        document.getElementById('playBtn').classList.add('playing');
                        requestAnimationFrame(updateProgress);
                    },
                    onpause: function () {
                        document.getElementById('playIcon').textContent = '▶';
                        document.getElementById('playBtn').classList.remove('playing');
                    },
                    onstop: function () {
                        document.getElementById('playIcon').textContent = '▶';
                        document.getElementById('playBtn').classList.remove('playing');
                        document.getElementById('progressBar').style.width = '0%';
                        document.getElementById('currentTime').textContent = '0:00';
                    },
                    onend: function () {
                        if (!isLooping) {
                            document.getElementById('playIcon').textContent = '▶';
                            document.getElementById('playBtn').classList.remove('playing');
                        }
                    }
                });

                // Volume control
                document.getElementById('volumeSlider').oninput = function (e) {
                    const volume = e.target.value / 100;
                    if (currentSound) currentSound.volume(volume);
                    document.getElementById('volumeValue').textContent = e.target.value + '%';
                };

                // Progress click
                document.getElementById('playerProgress').onclick = function (e) {
                    if (currentSound && currentSound.playing()) {
                        const rect = e.currentTarget.getBoundingClientRect();
                        const percent = (e.clientX - rect.left) / rect.width;
                        currentSound.seek(currentSound.duration() * percent);
                    }
                };

                // Auto-play
                currentSound.play();
            }

            function togglePlay() {
                if (!currentSound) return;
                if (currentSound.playing()) {
                    currentSound.pause();
                } else {
                    currentSound.play();
                }
            }

            function skipForward() {
                if (!currentSound) return;
                const seek = currentSound.seek() || 0;
                currentSound.seek(Math.min(seek + 10, currentSound.duration()));
            }

            function skipBackward() {
                if (!currentSound) return;
                const seek = currentSound.seek() || 0;
                currentSound.seek(Math.max(seek - 10, 0));
            }

            function toggleLoop() {
                isLooping = !isLooping;
                if (currentSound) currentSound.loop(isLooping);
                document.getElementById('loopBtn').classList.toggle('active', isLooping);
            }

            function changeSpeed() {
                const speeds = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0];
                const currentIndex = speeds.indexOf(currentSpeed);
                const nextIndex = (currentIndex + 1) % speeds.length;
                currentSpeed = speeds[nextIndex];

                if (currentSound) currentSound.rate(currentSpeed);
                document.getElementById('speedBtn').textContent = `⚡ ${currentSpeed}x`;
            }

            function updateProgress() {
                if (currentSound && currentSound.playing()) {
                    const seek = currentSound.seek() || 0;
                    const duration = currentSound.duration();
                    const percent = (seek / duration) * 100;

                    document.getElementById('progressBar').style.width = percent + '%';
                    document.getElementById('currentTime').textContent = formatTime(seek);

                    animationId = requestAnimationFrame(updateProgress);
                }
            }

            function drawWaveform() {
                const canvas = document.getElementById('waveform');
                const ctx = canvas.getContext('2d');

                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;

                const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                gradient.addColorStop(0, 'rgba(102, 126, 234, 0.3)');
                gradient.addColorStop(0.5, 'rgba(118, 75, 162, 0.3)');
                gradient.addColorStop(1, 'rgba(102, 126, 234, 0.3)');

                ctx.fillStyle = gradient;
                const bars = 150;
                const barWidth = canvas.width / bars;

                for (let i = 0; i < bars; i++) {
                    const barHeight = Math.random() * canvas.height * 0.7 + canvas.height * 0.3;
                    const x = i * barWidth;
                    const y = (canvas.height - barHeight) / 2;
                    ctx.fillRect(x, y, barWidth - 1, barHeight);
                }
            }

            // Utility functions
            function formatTime(seconds) {
                if (!seconds || isNaN(seconds)) return '0:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }

            function formatDuration(seconds) {
                if (!seconds) return 'N/A';
                return formatTime(seconds);
            }

            function formatFileSize(bytes) {
                if (!bytes) return 'N/A';
                const mb = bytes / (1024 * 1024);
                if (mb < 1) {
                    const kb = bytes / 1024;
                    return `${kb.toFixed(1)} KB`;
                }
                return `${mb.toFixed(2)} MB`;
            }

            function formatBitrate(bitrate) {
                if (!bitrate) return 'N/A';
                return `${Math.round(bitrate / 1000)} kbps`;
            }

            function formatDate(dateString) {
                if (!dateString) return 'N/A';
                const date = new Date(dateString);
                return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
            }

            function showLoading() {
                document.getElementById('results').innerHTML = `
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <p>Loading metadata...</p>
                </div>
            `;
            }

            function showError(message) {
                document.getElementById('results').innerHTML = `
                <div class="error-container">
                    <div class="error-icon">❌</div>
                    <h3>Error</h3>
                    <p>${message}</p>
                </div>
            `;
            }

            function refreshData() {
                loadStats();
                if (currentFile) {
                    loadFileMetadata(currentFile);
                } else {
                    loadRandom();
                }
            }
        </script>
    </body>
</html>
