<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            http-equiv="Content-Security-Policy"
            content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: file:;
        media-src 'self' file:;
        connect-src 'self';
        font-src 'self' data:;
    "
        />
        <title>MAP - Music Analyzer Pro</title>

        <!-- External Stylesheets -->
        <link rel="stylesheet" href="styles/reset.css" />
        <link rel="stylesheet" href="styles/variables.css" />
        <link rel="stylesheet" href="styles/base.css" />
        <link rel="stylesheet" href="styles/components.css" />
        <link rel="stylesheet" href="styles/layouts.css" />
        <link rel="stylesheet" href="styles/animations.css" />
        <link rel="stylesheet" href="styles/themes.css" />
    </head>
    <body>
        <!-- App Container -->
        <div id="app" class="app-container">
            <!-- Header Component -->
            <header id="app-header" class="app-header">
                <!-- Will be loaded dynamically -->
            </header>

            <!-- Navigation Component -->
            <nav id="app-navigation" class="app-navigation">
                <!-- Will be loaded dynamically -->
            </nav>

            <!-- Main Content Area -->
            <main id="app-main" class="app-main">
                <!-- Library View -->
                <section id="library-view" class="view-container active">
                    <!-- Will be loaded dynamically -->
                </section>

                <!-- Playlist View -->
                <section id="playlist-view" class="view-container">
                    <!-- Will be loaded dynamically -->
                </section>

                <!-- Analytics View -->
                <section id="analytics-view" class="view-container">
                    <!-- Will be loaded dynamically -->
                </section>

                <!-- Settings View -->
                <section id="settings-view" class="view-container">
                    <!-- Will be loaded dynamically -->
                </section>
            </main>

            <!-- Player Bar Component -->
            <footer id="player-bar" class="player-bar">
                <!-- Will be loaded dynamically -->
            </footer>

            <!-- Modal Container -->
            <div id="modal-container" class="modal-container">
                <!-- Modals will be inserted here -->
            </div>

            <!-- Toast Container -->
            <div id="toast-container" class="toast-container">
                <!-- Toasts will be inserted here -->
            </div>

            <!-- Context Menu Container -->
            <div id="context-menu-container" class="context-menu-container">
                <!-- Context menus will be inserted here -->
            </div>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="loading-content">
                <div class="loading-logo">🎵</div>
                <h1 class="loading-title">MAP</h1>
                <p class="loading-subtitle">Music Analyzer Pro</p>
                <div class="loading-progress">
                    <div class="loading-bar"></div>
                </div>
                <p class="loading-status">Initializing...</p>
            </div>
        </div>

        <!-- Core Scripts (Order matters) -->
        <script src="js/utils/constants.js"></script>
        <script src="js/utils/helpers.js"></script>
        <script src="js/utils/validators.js"></script>

        <!-- Services -->
        <script src="js/services/api-service.js"></script>
        <script src="js/services/storage-service.js"></script>
        <script src="js/services/event-bus.js"></script>

        <!-- Core Modules -->
        <script src="js/core/safe-dom.js"></script>
        <script src="js/core/memory-manager.js"></script>
        <script src="js/core/performance-monitor.js"></script>
        <script src="js/core/error-handler.js"></script>

        <!-- Components -->
        <script src="js/components/header.js"></script>
        <script src="js/components/navigation.js"></script>
        <script src="js/components/player-bar.js"></script>
        <script src="js/components/track-card.js"></script>
        <script src="js/components/track-table.js"></script>
        <script src="js/components/modal.js"></script>
        <script src="js/components/toast.js"></script>
        <script src="js/components/context-menu.js"></script>

        <!-- Views -->
        <script src="js/views/library-view.js"></script>
        <script src="js/views/playlist-view.js"></script>
        <script src="js/views/analytics-view.js"></script>
        <script src="js/views/settings-view.js"></script>

        <!-- Main Application -->
        <script src="js/app.js"></script>

        <!-- Initialize Application -->
        <script>
            // Wait for DOM and all scripts to load
            document.addEventListener('DOMContentLoaded', () => {
                console.log('🚀 Initializing MAP...');

                // Initialize the application
                if (window.App) {
                    window.app = new App();
                    window.app.init();
                } else {
                    console.error('Failed to load application');
                    document.getElementById('loading-status').textContent =
                        'Error: Failed to initialize';
                }
            });
        </script>
    </body>
</html>
