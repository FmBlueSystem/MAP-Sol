<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>🔍 Metadata Viewer - Music Analyzer Pro</title>
        <script src="https://cdn.jsdelivr.net/npm/howler@2.2.3/dist/howler.min.js"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
                    sans-serif;
                background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
                min-height: 100vh;
                padding: 20px;
                color: white;
            }

            .container {
                max-width: 1400px;
                margin: 0 auto;
            }

            h1 {
                text-align: center;
                margin-bottom: 30px;
                font-size: 2.5rem;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            }

            .search-section {
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                border-radius: 15px;
                padding: 25px;
                margin-bottom: 30px;
            }

            .search-controls {
                display: flex;
                gap: 15px;
                flex-wrap: wrap;
            }

            input[type='text'] {
                flex: 1;
                padding: 12px 20px;
                border: none;
                border-radius: 8px;
                background: rgba(255, 255, 255, 0.2);
                color: white;
                font-size: 16px;
                min-width: 300px;
            }

            input[type='text']::placeholder {
                color: rgba(255, 255, 255, 0.6);
            }

            button {
                padding: 12px 24px;
                border: none;
                border-radius: 8px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                font-size: 16px;
                cursor: pointer;
                transition:
                    transform 0.2s,
                    box-shadow 0.2s;
            }

            button:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            }

            button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .results-section {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
                gap: 25px;
            }

            .card {
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                border-radius: 15px;
                padding: 25px;
                animation: slideIn 0.3s ease-out;
            }

            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .card h2 {
                margin-bottom: 20px;
                color: #ffd700;
                font-size: 1.4rem;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .metadata-grid {
                display: grid;
                gap: 12px;
            }

            .metadata-item {
                display: grid;
                grid-template-columns: 140px 1fr;
                gap: 10px;
                padding: 8px;
                background: rgba(0, 0, 0, 0.2);
                border-radius: 6px;
            }

            .metadata-label {
                color: #87ceeb;
                font-weight: 600;
            }

            .metadata-value {
                color: white;
                word-break: break-word;
            }

            .metadata-value.empty {
                color: #999;
                font-style: italic;
            }

            .artwork-section {
                text-align: center;
                margin-bottom: 20px;
            }

            .artwork-image {
                max-width: 300px;
                width: 100%;
                border-radius: 10px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            }

            .comparison-section {
                background: rgba(255, 255, 255, 0.05);
                border-radius: 10px;
                padding: 15px;
                margin-top: 15px;
            }

            .comparison-item {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 10px;
            }

            .comparison-icon {
                font-size: 20px;
            }

            .match {
                color: #4ade80;
            }

            .mismatch {
                color: #fbbf24;
            }

            .loading {
                text-align: center;
                padding: 40px;
                font-size: 1.2rem;
            }

            .error {
                background: rgba(239, 68, 68, 0.2);
                border: 1px solid #ef4444;
                padding: 15px;
                border-radius: 8px;
                margin-bottom: 20px;
            }

            .stats-bar {
                background: rgba(0, 0, 0, 0.3);
                border-radius: 8px;
                padding: 15px;
                margin-bottom: 20px;
                display: flex;
                justify-content: space-around;
                flex-wrap: wrap;
                gap: 15px;
            }

            .stat-item {
                text-align: center;
            }

            .stat-value {
                font-size: 1.8rem;
                font-weight: bold;
                color: #ffd700;
            }

            .stat-label {
                font-size: 0.9rem;
                color: #87ceeb;
            }

            .progress-bar {
                width: 100%;
                height: 25px;
                background: rgba(0, 0, 0, 0.3);
                border-radius: 12px;
                overflow: hidden;
                margin: 10px 0;
            }

            .progress-fill {
                height: 100%;
                background: linear-gradient(90deg, #4ade80, #22d3ee);
                border-radius: 12px;
                transition: width 0.3s ease;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
                font-weight: bold;
            }

            /* Player Styles */
            .player-section {
                background: rgba(0, 0, 0, 0.4);
                backdrop-filter: blur(15px);
                border-radius: 15px;
                padding: 20px;
                margin-bottom: 25px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            }

            .player-controls {
                display: flex;
                align-items: center;
                gap: 20px;
                margin-bottom: 15px;
            }

            .play-button {
                width: 60px;
                height: 60px;
                border-radius: 50%;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border: none;
                color: white;
                font-size: 24px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    transform 0.2s,
                    box-shadow 0.2s;
            }

            .play-button:hover {
                transform: scale(1.1);
                box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
            }

            .play-button.playing {
                background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            }

            .player-info {
                flex: 1;
            }

            .player-title {
                font-size: 1.2rem;
                font-weight: bold;
                color: white;
                margin-bottom: 5px;
            }

            .player-artist {
                color: #87ceeb;
                font-size: 0.95rem;
            }

            .volume-control {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .volume-slider {
                width: 100px;
                height: 6px;
                -webkit-appearance: none;
                appearance: none;
                background: rgba(255, 255, 255, 0.2);
                border-radius: 3px;
                outline: none;
            }

            .volume-slider::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                width: 16px;
                height: 16px;
                background: #667eea;
                border-radius: 50%;
                cursor: pointer;
            }

            .volume-slider::-moz-range-thumb {
                width: 16px;
                height: 16px;
                background: #667eea;
                border-radius: 50%;
                cursor: pointer;
                border: none;
            }

            .player-progress {
                position: relative;
                height: 40px;
                background: rgba(0, 0, 0, 0.3);
                border-radius: 8px;
                overflow: hidden;
                cursor: pointer;
                margin-bottom: 10px;
            }

            .player-waveform {
                position: absolute;
                width: 100%;
                height: 100%;
                opacity: 0.3;
            }

            .player-progress-bar {
                position: absolute;
                height: 100%;
                background: linear-gradient(90deg, #667eea, #764ba2);
                width: 0%;
                transition: width 0.1s linear;
                display: flex;
                align-items: center;
                justify-content: flex-end;
                padding-right: 10px;
            }

            .player-time {
                display: flex;
                justify-content: space-between;
                color: #87ceeb;
                font-size: 0.9rem;
            }

            .player-buttons {
                display: flex;
                gap: 10px;
                justify-content: center;
                margin-top: 15px;
            }

            .control-btn {
                padding: 8px 16px;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: white;
                border-radius: 6px;
                cursor: pointer;
                transition: background 0.2s;
            }

            .control-btn:hover {
                background: rgba(255, 255, 255, 0.2);
            }

            .control-btn.active {
                background: #667eea;
                border-color: #667eea;
            }

            @keyframes pulse {
                0% {
                    box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7);
                }
                70% {
                    box-shadow: 0 0 0 10px rgba(102, 126, 234, 0);
                }
                100% {
                    box-shadow: 0 0 0 0 rgba(102, 126, 234, 0);
                }
            }

            .play-button.playing {
                animation: pulse 2s infinite;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>🔍 Metadata Viewer</h1>

            <!-- Player Section -->
            <div id="playerSection" class="player-section" style="display: none">
                <div class="player-controls">
                    <button id="playBtn" class="play-button" onclick="togglePlay()">
                        <span id="playIcon">▶</span>
                    </button>
                    <div class="player-info">
                        <div id="playerTitle" class="player-title">No track loaded</div>
                        <div id="playerArtist" class="player-artist">-</div>
                    </div>
                    <div class="volume-control">
                        <span>🔊</span>
                        <input
                            type="range"
                            id="volumeSlider"
                            class="volume-slider"
                            min="0"
                            max="100"
                            value="70"
                        />
                        <span id="volumeValue">70%</span>
                    </div>
                </div>

                <div id="playerProgress" class="player-progress">
                    <canvas id="waveform" class="player-waveform"></canvas>
                    <div id="progressBar" class="player-progress-bar"></div>
                </div>

                <div class="player-time">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>

                <div class="player-buttons">
                    <button class="control-btn" onclick="skipBackward()">⏮ -10s</button>
                    <button class="control-btn" onclick="skipForward()">⏭ +10s</button>
                    <button id="loopBtn" class="control-btn" onclick="toggleLoop()">🔁 Loop</button>
                    <button class="control-btn" onclick="changeSpeed()">⚡ Speed</button>
                </div>
            </div>

            <div class="search-section">
                <div class="search-controls">
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="Buscar por título, artista o archivo..."
                    />
                    <button onclick="searchFiles()">🔍 Buscar</button>
                    <button onclick="loadRandom()">🎲 Aleatorio</button>
                    <button onclick="refreshData()">🔄 Refrescar</button>
                </div>
            </div>

            <div id="statsBar" class="stats-bar" style="display: none">
                <div class="stat-item">
                    <div class="stat-value" id="totalFiles">0</div>
                    <div class="stat-label">Archivos Totales</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="withArtwork">0</div>
                    <div class="stat-label">Con Carátula</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="withAI">0</div>
                    <div class="stat-label">Análisis AI</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="avgBPM">0</div>
                    <div class="stat-label">BPM Promedio</div>
                </div>
            </div>

            <div id="results" class="results-section"></div>
        </div>

        <script>
            const { ipcRenderer } = require('electron');
            const path = require('path');

            let currentFile = null;
            let currentSound = null;
            let isLooping = false;
            let currentSpeed = 1.0;
            let animationId = null;
            let currentData = null; // Guardar datos actuales para el player

            // Cargar estadísticas al inicio
            async function loadStats() {
                try {
                    const stats = await ipcRenderer.invoke('get-database-stats');
                    if (stats) {
                        document.getElementById('totalFiles').textContent = stats.totalFiles || '0';
                        document.getElementById('withArtwork').textContent =
                            stats.withArtwork || '0';
                        document.getElementById('withAI').textContent = stats.withAI || '0';
                        document.getElementById('avgBPM').textContent = Math.round(
                            stats.avgBPM || 0
                        );
                        document.getElementById('statsBar').style.display = 'flex';
                    }
                } catch (error) {
                    console.error('Error loading stats:', error);
                }
            }

            // Buscar archivos
            async function searchFiles() {
                const searchTerm = document.getElementById('searchInput').value;
                if (!searchTerm) {
                    showError('Por favor ingresa un término de búsqueda');
                    return;
                }

                showLoading();

                try {
                    const results = await ipcRenderer.invoke('search-metadata', searchTerm);
                    if (results && results.length > 0) {
                        // Tomar el primer resultado
                        await loadFileMetadata(results[0].file_path);
                    } else {
                        showError('No se encontraron resultados');
                    }
                } catch (error) {
                    showError('Error al buscar: ' + error.message);
                }
            }

            // Cargar archivo aleatorio
            async function loadRandom() {
                showLoading();

                try {
                    const result = await ipcRenderer.invoke('get-random-file');
                    if (result) {
                        await loadFileMetadata(result.file_path);
                    }
                } catch (error) {
                    showError('Error al cargar archivo aleatorio: ' + error.message);
                }
            }

            // Cargar metadatos de un archivo
            async function loadFileMetadata(filePath) {
                if (!filePath) return;

                currentFile = filePath;
                showLoading();

                try {
                    // Obtener metadatos del archivo y de la BD
                    const data = await ipcRenderer.invoke('get-file-metadata', filePath);

                    if (data) {
                        displayResults(data);
                    } else {
                        showError('No se pudieron obtener los metadatos');
                    }
                } catch (error) {
                    showError('Error al cargar metadatos: ' + error.message);
                }
            }

            // ==================== PLAYER FUNCTIONS ====================

            // Inicializar reproductor con archivo
            function initPlayer(filePath, title, artist) {
                // Detener sonido anterior si existe
                if (currentSound) {
                    currentSound.unload();
                }

                // Mostrar sección del player
                document.getElementById('playerSection').style.display = 'block';

                // Actualizar info
                document.getElementById('playerTitle').textContent =
                    title || path.basename(filePath);
                document.getElementById('playerArtist').textContent = artist || 'Unknown Artist';

                // Crear nuevo Howl
                currentSound = new Howl({
                    src: [filePath],
                    html5: true, // Importante para archivos locales
                    volume: 0.7,
                    rate: currentSpeed,
                    loop: isLooping,
                    onload: function () {
                        const duration = currentSound.duration();
                        document.getElementById('duration').textContent = formatTime(duration);
                        drawWaveform();
                    },
                    onplay: function () {
                        document.getElementById('playIcon').textContent = '⏸';
                        document.getElementById('playBtn').classList.add('playing');
                        requestAnimationFrame(updateProgress);
                    },
                    onpause: function () {
                        document.getElementById('playIcon').textContent = '▶';
                        document.getElementById('playBtn').classList.remove('playing');
                    },
                    onstop: function () {
                        document.getElementById('playIcon').textContent = '▶';
                        document.getElementById('playBtn').classList.remove('playing');
                        document.getElementById('progressBar').style.width = '0%';
                        document.getElementById('currentTime').textContent = '0:00';
                    },
                    onend: function () {
                        if (!isLooping) {
                            document.getElementById('playIcon').textContent = '▶';
                            document.getElementById('playBtn').classList.remove('playing');
                        }
                    }
                });

                // Volume control
                document.getElementById('volumeSlider').addEventListener('input', e => {
                    const volume = e.target.value / 100;
                    currentSound.volume(volume);
                    document.getElementById('volumeValue').textContent = e.target.value + '%';
                });

                // Progress click
                document.getElementById('playerProgress').addEventListener('click', e => {
                    if (currentSound && currentSound.playing()) {
                        const rect = e.currentTarget.getBoundingClientRect();
                        const percent = (e.clientX - rect.left) / rect.width;
                        currentSound.seek(currentSound.duration() * percent);
                    }
                });
            }

            // Toggle play/pause
            function togglePlay() {
                if (!currentSound) return;

                if (currentSound.playing()) {
                    currentSound.pause();
                } else {
                    currentSound.play();
                }
            }

            // Skip forward 10 seconds
            function skipForward() {
                if (!currentSound) return;
                const seek = currentSound.seek() || 0;
                currentSound.seek(Math.min(seek + 10, currentSound.duration()));
            }

            // Skip backward 10 seconds
            function skipBackward() {
                if (!currentSound) return;
                const seek = currentSound.seek() || 0;
                currentSound.seek(Math.max(seek - 10, 0));
            }

            // Toggle loop
            function toggleLoop() {
                isLooping = !isLooping;
                if (currentSound) {
                    currentSound.loop(isLooping);
                }
                document.getElementById('loopBtn').classList.toggle('active', isLooping);
            }

            // Change playback speed
            function changeSpeed() {
                const speeds = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0];
                const currentIndex = speeds.indexOf(currentSpeed);
                const nextIndex = (currentIndex + 1) % speeds.length;
                currentSpeed = speeds[nextIndex];

                if (currentSound) {
                    currentSound.rate(currentSpeed);
                }

                // Update button text
                const btn = event.target;
                btn.textContent = `⚡ ${currentSpeed}x`;
            }

            // Update progress bar
            function updateProgress() {
                if (currentSound && currentSound.playing()) {
                    const seek = currentSound.seek() || 0;
                    const duration = currentSound.duration();

                    // Update progress bar
                    const percent = (seek / duration) * 100;
                    document.getElementById('progressBar').style.width = percent + '%';

                    // Update time
                    document.getElementById('currentTime').textContent = formatTime(seek);

                    // Continue animation
                    animationId = requestAnimationFrame(updateProgress);
                }
            }

            // Format time in mm:ss
            function formatTime(seconds) {
                if (!seconds || isNaN(seconds)) return '0:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }

            // Draw simple waveform visualization
            function drawWaveform() {
                const canvas = document.getElementById('waveform');
                const ctx = canvas.getContext('2d');

                // Set canvas size
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;

                // Draw fake waveform (real waveform would need audio analysis)
                ctx.fillStyle = 'rgba(102, 126, 234, 0.3)';
                const bars = 100;
                const barWidth = canvas.width / bars;

                for (let i = 0; i < bars; i++) {
                    const barHeight = Math.random() * canvas.height * 0.8 + canvas.height * 0.2;
                    const x = i * barWidth;
                    const y = (canvas.height - barHeight) / 2;

                    ctx.fillRect(x, y, barWidth - 1, barHeight);
                }
            }

            // Inicializar player desde datos actuales
            function initPlayerFromData() {
                if (currentData && currentData.filePath) {
                    const title =
                        currentData.metadata?.title || currentData.database?.title || 'Unknown';
                    const artist =
                        currentData.metadata?.artist || currentData.database?.artist || 'Unknown';
                    initPlayer(currentData.filePath, title, artist);
                }
            }

            // Mostrar resultados
            function displayResults(data) {
                const resultsDiv = document.getElementById('results');

                // Guardar datos actuales
                currentData = data;

                let html = '';

                // Carátula si existe
                if (data.artwork) {
                    html += `
                    <div class="card">
                        <h2>🎨 Carátula</h2>
                        <div class="artwork-section">
                            <img src="${data.artwork}" class="artwork-image" alt="Artwork">
                        </div>
                        <div class="metadata-item">
                            <span class="metadata-label">Archivo:</span>
                            <span class="metadata-value">${path.basename(data.filePath)}</span>
                        </div>
                        <div style="text-align: center; margin-top: 15px;">
                            <button class="play-button" style="width: 100px; height: 100px; font-size: 40px;" 
                                    onclick="initPlayerFromData()">
                                ▶
                            </button>
                            <p style="margin-top: 10px; color: #87ceeb;">Click para reproducir</p>
                        </div>
                    </div>
                `;
                }

                // Si no hay carátula, agregar botón de play en la primera tarjeta
                if (!data.artwork) {
                    html += `
                    <div class="card">
                        <h2>🎵 Reproducir</h2>
                        <div style="text-align: center; padding: 20px;">
                            <button class="play-button" style="width: 100px; height: 100px; font-size: 40px;" 
                                    onclick="initPlayerFromData()">
                                ▶
                            </button>
                            <p style="margin-top: 10px; color: #87ceeb;">Click para reproducir</p>
                            <div class="metadata-item" style="margin-top: 20px;">
                                <span class="metadata-label">Archivo:</span>
                                <span class="metadata-value">${path.basename(data.filePath)}</span>
                            </div>
                        </div>
                    </div>
                `;
                }

                // Información del archivo
                html += `
                <div class="card">
                    <h2>📁 Información del Archivo</h2>
                    <div class="metadata-grid">
                        ${createMetadataItem('Path', data.filePath)}
                        ${createMetadataItem('Tamaño', formatFileSize(data.fileSize))}
                        ${createMetadataItem('Formato', data.format?.container)}
                        ${createMetadataItem('Codec', data.format?.codec)}
                        ${createMetadataItem('Sample Rate', data.format?.sampleRate ? data.format.sampleRate + ' Hz' : null)}
                        ${createMetadataItem('Bitrate', formatBitrate(data.format?.bitrate))}
                        ${createMetadataItem('Duración', formatDuration(data.format?.duration))}
                        ${createMetadataItem('Canales', data.format?.channels)}
                        ${createMetadataItem('Lossless', data.format?.lossless ? 'Sí' : 'No')}
                    </div>
                </div>
            `;

                // Metadatos comunes
                html += `
                <div class="card">
                    <h2>🏷️ Metadatos del Archivo</h2>
                    <div class="metadata-grid">
                        ${createMetadataItem('Título', data.metadata?.title)}
                        ${createMetadataItem('Artista', data.metadata?.artist)}
                        ${createMetadataItem('Álbum', data.metadata?.album)}
                        ${createMetadataItem('Año', data.metadata?.year)}
                        ${createMetadataItem('Género', data.metadata?.genre)}
                        ${createMetadataItem('Track', data.metadata?.track)}
                        ${createMetadataItem('BPM', data.metadata?.bpm)}
                        ${createMetadataItem('Key', data.metadata?.key)}
                        ${createMetadataItem('ISRC', data.metadata?.isrc)}
                        ${createMetadataItem('Label', data.metadata?.label)}
                        ${createMetadataItem('Compositor', data.metadata?.composer)}
                    </div>
                </div>
            `;

                // Datos de la base de datos
                if (data.database) {
                    html += `
                    <div class="card">
                        <h2>💾 Base de Datos</h2>
                        <div class="metadata-grid">
                            ${createMetadataItem('ID', data.database.id)}
                            ${createMetadataItem('Título (BD)', data.database.title)}
                            ${createMetadataItem('Artista (BD)', data.database.artist)}
                            ${createMetadataItem('Álbum (BD)', data.database.album)}
                            ${createMetadataItem('Género (BD)', data.database.genre)}
                            ${createMetadataItem('Creado', formatDate(data.database.created_at))}
                            ${createMetadataItem('Actualizado', formatDate(data.database.updated_at))}
                        </div>
                        ${createComparison(data)}
                    </div>
                `;
                }

                // Análisis AI
                if (data.ai) {
                    html += `
                    <div class="card">
                        <h2>🤖 Análisis AI/LLM</h2>
                        <div class="metadata-grid">
                            ${createMetadataItem('LLM Género', data.ai.LLM_GENRE)}
                            ${createMetadataItem('AI Mood', data.ai.AI_MOOD)}
                            ${createMetadataItem('LLM Mood', data.ai.LLM_MOOD)}
                            ${createMetadataItem('AI BPM', data.ai.AI_BPM)}
                            ${createMetadataItem('AI Key', data.ai.AI_KEY)}
                        </div>
                        ${createProgressBars(data.ai)}
                    </div>
                `;
                }

                resultsDiv.innerHTML = html;
            }

            // Crear item de metadatos
            function createMetadataItem(label, value) {
                const displayValue = value || 'N/A';
                const className = value ? 'metadata-value' : 'metadata-value empty';
                return `
                <div class="metadata-item">
                    <span class="metadata-label">${label}:</span>
                    <span class="${className}">${displayValue}</span>
                </div>
            `;
            }

            // Crear comparación
            function createComparison(data) {
                if (!data.metadata || !data.database) return '';

                const comparisons = [
                    { field: 'Título', file: data.metadata.title, db: data.database.title },
                    { field: 'Artista', file: data.metadata.artist, db: data.database.artist },
                    { field: 'Álbum', file: data.metadata.album, db: data.database.album },
                    { field: 'Género', file: data.metadata.genre, db: data.database.genre }
                ];

                let html = '<div class="comparison-section"><h3>🔄 Comparación</h3>';

                comparisons.forEach(comp => {
                    const match = comp.file === comp.db;
                    const icon = match ? '✅' : '⚠️';
                    const className = match ? 'match' : 'mismatch';

                    html += `
                    <div class="comparison-item">
                        <span class="comparison-icon ${className}">${icon}</span>
                        <span>${comp.field}: ${match ? 'Coincide' : `"${comp.file || 'N/A'}" ≠ "${comp.db || 'N/A'}"`}</span>
                    </div>
                `;
                });

                html += '</div>';
                return html;
            }

            // Crear barras de progreso para valores AI
            function createProgressBars(ai) {
                const bars = [
                    { label: 'Energy', value: ai.AI_ENERGY, color: '#ef4444' },
                    { label: 'Danceability', value: ai.AI_DANCEABILITY, color: '#f59e0b' },
                    { label: 'Valence', value: ai.AI_VALENCE, color: '#10b981' },
                    { label: 'Acousticness', value: ai.AI_ACOUSTICNESS, color: '#3b82f6' },
                    { label: 'Instrumentalness', value: ai.AI_INSTRUMENTALNESS, color: '#8b5cf6' },
                    { label: 'Liveness', value: ai.AI_LIVENESS, color: '#ec4899' },
                    { label: 'Speechiness', value: ai.AI_SPEECHINESS, color: '#14b8a6' }
                ];

                let html = '<div style="margin-top: 15px;">';

                bars.forEach(bar => {
                    if (bar.value !== null && bar.value !== undefined) {
                        const percentage = Math.round(bar.value * 100);
                        html += `
                        <div style="margin-bottom: 10px;">
                            <div style="margin-bottom: 5px; font-size: 0.9rem;">${bar.label}</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${percentage}%; background: ${bar.color};">
                                    ${percentage}%
                                </div>
                            </div>
                        </div>
                    `;
                    }
                });

                html += '</div>';
                return html;
            }

            // Formatear duración
            function formatDuration(seconds) {
                if (!seconds) return 'N/A';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }

            // Formatear bitrate
            function formatBitrate(bitrate) {
                if (!bitrate) return 'N/A';
                return `${Math.round(bitrate / 1000)} kbps`;
            }

            // Formatear tamaño de archivo
            function formatFileSize(bytes) {
                if (!bytes) return 'N/A';
                const mb = bytes / (1024 * 1024);
                return `${mb.toFixed(2)} MB`;
            }

            // Formatear fecha
            function formatDate(dateString) {
                if (!dateString) return 'N/A';
                return new Date(dateString).toLocaleString();
            }

            // Mostrar loading
            function showLoading() {
                document.getElementById('results').innerHTML =
                    '<div class="loading">⏳ Cargando...</div>';
            }

            // Mostrar error
            function showError(message) {
                document.getElementById('results').innerHTML =
                    `<div class="error">❌ ${message}</div>`;
            }

            // Refrescar datos
            function refreshData() {
                if (currentFile) {
                    loadFileMetadata(currentFile);
                }
                loadStats();
            }

            // Atajos de teclado
            document.addEventListener('keydown', e => {
                if (e.key === 'Enter' && document.getElementById('searchInput').value) {
                    searchFiles();
                } else if (e.key === 'r' && e.ctrlKey) {
                    e.preventDefault();
                    loadRandom();
                }
            });

            // Cargar estadísticas al inicio
            loadStats();

            // Cargar un archivo aleatorio al inicio
            loadRandom();
        </script>
    </body>
</html>
